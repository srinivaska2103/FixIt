<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>FixIt | Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#2563eb' }
                }
            }
        }
    </script>
    <style>
        body { 
            transition: background-color 0.3s, color 0.3s;
            overflow: hidden; 
        }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 h-screen w-screen flex flex-col">

    <header class="fixed top-0 left-0 right-0 h-16 flex justify-between items-center px-6 z-50 bg-slate-50/80 dark:bg-slate-950/80 backdrop-blur-md">
      <a href="index.html">
        <div class="flex items-center gap-2">
            <div class="bg-primary p-1.5 rounded-lg"><i data-lucide="smartphone" class="text-white w-4 h-4"></i></div>
            <span class="text-lg font-bold tracking-tighter uppercase">FIX<span class="text-primary">IT</span></span>
        </div>
      </a>
        
        <div class="flex gap-2">
            <button onclick="toggleDirection()" class="bg-white dark:bg-slate-800 border dark:border-slate-700 px-3 py-1.5 rounded-xl text-xs font-bold shadow-sm active:scale-95 transition">
                <span id="dir-label">LTR</span>
            </button>
            <button onclick="toggleTheme()" class="p-2 bg-white dark:bg-slate-800 border dark:border-slate-700 rounded-xl shadow-sm active:scale-95 transition">
                <i data-lucide="sun" id="sun-icon" class="w-4 h-4 text-yellow-500 hidden"></i>
                <i data-lucide="moon" id="moon-icon" class="w-4 h-4 text-slate-600 dark:text-blue-400"></i>
            </button>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-4 md:p-8 mt-16 overflow-hidden">
        <div class="bg-white dark:bg-slate-900 w-full max-w-5xl h-full max-h-[600px] rounded-[2rem] md:rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col md:flex-row border dark:border-slate-800">
            
            <div class="hidden md:flex md:w-5/12 lg:w-1/2 bg-primary p-10 flex-col justify-between relative overflow-hidden">
                <div class="absolute top-0 right-0 w-64 h-64 bg-white/10 rounded-full -mr-32 -mt-32 blur-3xl"></div>
                <div class="relative z-10">
                    <h2 class="text-3xl lg:text-4xl font-semibold font-black text-white leading-tight mb-4 uppercase tracking-tighter">Repair Tracking <br>Simplified.</h2>
                    <p class="text-blue-100 text-sm lg:text-base opacity-90">Securely access your dashboard to manage repairs and view real-time status updates.</p>
                </div>
                
                <div class="relative z-10 bg-white/10 backdrop-blur-lg border border-white/20 p-5 rounded-2xl">
                    <div class="flex items-center gap-4 mb-3">
                        <div class="w-10 h-10 bg-green-400 rounded-full flex items-center justify-center">
                            <i data-lucide="check" class="text-white w-5 h-5"></i>
                        </div>
                        <div class="text-white">
                            <p class="font-bold text-sm">Security Verified</p>
                            <p class="text-[10px] opacity-70">SSL Encrypted Session Active</p>
                        </div>
                    </div>
                    <div class="h-1.5 w-full bg-white/20 rounded-full overflow-hidden">
                        <div class="h-full bg-white w-full"></div>
                    </div>
                </div>
            </div>

            <div class="flex-1 p-6 sm:p-10 lg:p-16 flex flex-col justify-center relative overflow-y-auto custom-scroll">
                
                <div id="login-form" class="w-full max-w-sm mx-auto">
                    <h1 class="text-2xl sm:text-3xl  text-center mb-1">Welcome Back</h1>
                    <p class="text-sm text-slate-500 text-center dark:text-slate-400 mb-8">Enter your credentials to access your account.</p>

                    <form onsubmit="event.preventDefault()" class="space-y-5">
                        <div>
                            <label class="block text-[10px] font-bold uppercase text-slate-400 mb-1.5 ml-1">Email Address</label>
                            <input type="email" placeholder="name@example.com" class="w-full p-4 bg-slate-50 dark:bg-slate-800 rounded-xl outline-none focus:ring-2 focus:ring-primary border-none transition-all dark:text-white text-sm">
                        </div>
                        <div>
                            <div class="flex justify-between items-center mb-1.5 ml-1">
                                <label class="block text-[10px] font-bold uppercase text-slate-400">Password</label>
                                <a href="#" class="text-[10px] font-bold text-primary hover:underline uppercase">Forgot Password?</a>
                            </div>
                            <input type="password" placeholder="••••••••" class="w-full p-4 bg-slate-50 dark:bg-slate-800 rounded-xl outline-none focus:ring-2 focus:ring-primary border-none transition-all dark:text-white text-sm">
                        </div>
                        
                        <div class="pt-2">
                            <button class="w-full bg-primary text-white py-4 rounded-xl font-bold shadow-lg shadow-blue-500/30 hover:bg-blue-700 transition-all active:scale-[0.98]">
                                Sign In
                            </button>
                        </div>
                    </form>

                    <div class="relative my-8">
                        <div class="absolute inset-0 flex items-center"><span class="w-full border-t dark:border-slate-800"></span></div>
                        <div class="relative flex justify-center text-[10px] uppercase font-bold tracking-widest"><span class="bg-white dark:bg-slate-900 px-3 text-slate-400">Security Gate</span></div>
                    </div>

                    <div class="flex items-center justify-center gap-2 text-slate-400">
                        <i data-lucide="shield-lock" class="w-4 h-4"></i>
                        <a href="regeister.html">
                                                    <span class="text-[10px] text-blue-600 font-bold uppercase tracking-widest">Don't have an Account? Signup?</span>

                        </a>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        const html = document.documentElement;
        
        function updateUI() {
            const theme = localStorage.getItem('theme') || 'light';
            if (theme === 'dark') {
                html.classList.add('dark');
                document.getElementById('sun-icon').classList.remove('hidden');
                document.getElementById('moon-icon').classList.add('hidden');
            } else {
                html.classList.remove('dark');
                document.getElementById('sun-icon').classList.add('hidden');
                document.getElementById('moon-icon').classList.remove('hidden');
            }

            const dir = localStorage.getItem('dir') || 'ltr';
            html.dir = dir;
            document.getElementById('dir-label').innerText = dir.toUpperCase();

            lucide.createIcons();
        }

        function toggleTheme() {
            const current = localStorage.getItem('theme') === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', current);
            updateUI();
        }

        function toggleDirection() {
            const current = html.dir === 'ltr' ? 'rtl' : 'ltr';
            localStorage.setItem('dir', current);
            updateUI();
        }

        window.onload = updateUI;
    </script>
</body>
</html>
