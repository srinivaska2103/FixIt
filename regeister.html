<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>FixIt | Create Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#2563eb' }
                }
            }
        }
    </script>
    <style>
        body { 
            transition: background-color 0.3s, color 0.3s;
            overflow: hidden; 
        }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 h-screen w-screen flex flex-col">

    <header class="fixed top-0 left-0 right-0 h-16 flex justify-between items-center px-6 z-50 bg-slate-50/80 dark:bg-slate-950/80 backdrop-blur-md">
      <a href="index.html">
        <div class="flex items-center gap-2">
            <div class="bg-primary p-1.5 rounded-lg"><i data-lucide="smartphone" class="text-white w-4 h-4"></i></div>
            <span class="text-lg font-bold tracking-tighter uppercase">FIX<span class="text-primary">IT</span></span>
        </div>
      </a>
        
        <div class="flex gap-2">
            <button onclick="toggleDirection()" class="bg-white dark:bg-slate-800 border dark:border-slate-700 px-3 py-1.5 rounded-xl text-xs font-bold shadow-sm active:scale-95 transition">
                <span id="dir-label">LTR</span>
            </button>
            <button onclick="toggleTheme()" class="p-2 bg-white dark:bg-slate-800 border dark:border-slate-700 rounded-xl shadow-sm active:scale-95 transition">
                <i data-lucide="sun" id="sun-icon" class="w-4 h-4 text-yellow-500 hidden"></i>
                <i data-lucide="moon" id="moon-icon" class="w-4 h-4 text-slate-600 dark:text-blue-400"></i>
            </button>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-4 md:p-8 mt-16 overflow-hidden">
        <div class="bg-white dark:bg-slate-900 w-full max-w-5xl h-full max-h-[750px] rounded-[2rem] md:rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col md:flex-row border dark:border-slate-800">
            
            <div class="hidden md:flex md:w-5/12 lg:w-1/2 bg-primary p-10 flex-col justify-between relative overflow-hidden">
                <div class="absolute top-0 right-0 w-64 h-64 bg-white/10 rounded-full -mr-32 -mt-32 blur-3xl"></div>
                <div class="relative z-10">
                    <h2 class="text-3xl lg:text-4xl font-semibold font-black text-white leading-tight mb-4 uppercase tracking-tighter">Start Your <br>Repair Journey.</h2>
                    <p class="text-blue-100 text-sm lg:text-base opacity-90">Create an account to track repairs, book appointments, and receive instant status notifications.</p>
                </div>
                
                <div class="relative z-10 bg-white/10 backdrop-blur-lg border border-white/20 p-5 rounded-2xl">
                    <div class="flex items-center gap-4 mb-3">
                        <div class="w-10 h-10 bg-blue-400 rounded-full flex items-center justify-center">
                            <i data-lucide="user-plus" class="text-white w-5 h-5"></i>
                        </div>
                        <div class="text-white">
                            <p class="font-bold text-sm">Free Registration</p>
                            <p class="text-[10px] opacity-70">No credit card required for basic tracking.</p>
                        </div>
                    </div>
                    <div class="h-1.5 w-full bg-white/20 rounded-full overflow-hidden">
                        <div class="h-full bg-white w-1/3"></div> </div>
                </div>
            </div>

            <div class="flex-1 p-6 sm:p-10 lg:p-16 flex flex-col justify-center relative overflow-y-auto custom-scroll">
                
                <div id="signup-form" class="w-full max-w-sm mx-auto">
                    <h1 class="text-2xl sm:text-3xl text-center font-black mb-1">Create Account</h1>
                    <p class="text-sm text-slate-500 text-center dark:text-slate-400 mb-8">Join the FixIt community today.</p>

                    <form onsubmit="event.preventDefault()" class="space-y-4">
                        <div>
                            <label class="block text-[10px] font-bold uppercase text-slate-400 mb-1.5 ml-1">Full Name</label>
                            <input type="text" placeholder="Srinivas K A" class="w-full p-4 bg-slate-50 dark:bg-slate-800 rounded-xl outline-none focus:ring-2 focus:ring-primary border-none transition-all dark:text-white text-sm">
                        </div>

                        <div>
                            <label class="block text-[10px] font-bold uppercase text-slate-400 mb-1.5 ml-1">Email Address</label>
                            <input type="email" placeholder="name@example.com" class="w-full p-4 bg-slate-50 dark:bg-slate-800 rounded-xl outline-none focus:ring-2 focus:ring-primary border-none transition-all dark:text-white text-sm">
                        </div>

                        <div>
                            <label class="block text-[10px] font-bold uppercase text-slate-400 mb-1.5 ml-1">Create Password</label>
                            <input type="password" placeholder="••••••••" class="w-full p-4 bg-slate-50 dark:bg-slate-800 rounded-xl outline-none focus:ring-2 focus:ring-primary border-none transition-all dark:text-white text-sm">
                        </div>

                        <div class="pt-2">
                            <button class="w-full bg-primary text-white py-4 rounded-xl font-bold shadow-lg shadow-blue-500/30 hover:bg-blue-700 transition-all active:scale-[0.98]">
                                Create Account
                            </button>
                        </div>
                    </form>

                   
                    <div class="relative my-8">
    <div class="absolute inset-0 flex items-center">
        <span class="w-full border-t dark:border-slate-800"></span>
    </div>
    <div class="relative flex justify-center text-[10px] uppercase font-black tracking-[0.2em]">
        <span class="bg-white dark:bg-slate-900 px-4 text-slate-400">Or continue with</span>
    </div>
</div>

<div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
    <button type="button" class="flex items-center justify-center gap-2 py-3 px-4 border dark:border-slate-800 rounded-2xl hover:bg-slate-50 dark:hover:bg-slate-800 transition-all active:scale-95 group">
        <svg class="w-4 h-4" viewBox="0 0 24 24">
            <path fill="#EA4335" d="M12.48 10.92v3.28h7.84c-.24 1.84-2 5.28-7.84 5.28-5.08 0-9.24-4.2-9.24-9.36s4.16-9.36 9.24-9.36c2.88 0 4.84 1.2 5.92 2.28l2.6-2.6c-1.68-1.56-3.84-2.52-8.52-2.52-6.6 0-12 5.4-12 12s5.4 12 12 12c7.2 0 11.64-5.04 11.64-11.52 0-.84-.12-1.44-.24-2.04h-11.4z"/>
        </svg>
        <span class="text-xs font-bold dark:text-white">Google</span>
    </button>

    <button type="button" class="flex items-center justify-center gap-2 py-3 px-4 border dark:border-slate-800 rounded-2xl hover:bg-slate-50 dark:hover:bg-slate-800 transition-all active:scale-95">
        <svg class="w-4 h-4" fill="#1877F2" viewBox="0 0 24 24">
            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
        </svg>
        <span class="text-xs font-bold dark:text-white">Facebook</span>
    </button>

    <button type="button" class="flex items-center justify-center gap-2 py-3 px-4 border dark:border-slate-800 rounded-2xl hover:bg-slate-50 dark:hover:bg-slate-800 transition-all active:scale-95">
        <svg class="w-4 h-4 fill-current dark:text-white text-slate-900" viewBox="0 0 24 24">
            <path d="M17.05 20.28c-.98.95-2.05 1.72-3.33 1.72-1.21 0-1.63-.73-3.13-.73-1.48 0-1.98.71-3.13.73-1.28.02-2.38-.85-3.33-1.72-2.15-2.1-3.66-6-3.66-8.98 0-4.43 2.73-6.78 5.32-6.78 1.34 0 2.41.82 3.23.82.81 0 2.05-.88 3.51-.88 1.33 0 3.03.62 4.09 2-.23.14-2.45 1.43-2.45 4.3 0 3.42 2.92 4.56 2.96 4.58-.02.08-.46 1.6-1.5 3.07zM12.03 5.43c-.1-.01-.2-.01-.3 0-1.57-.14-3-1.48-2.9-3.23.1-.01.2-.01.3 0 1.64.14 2.93 1.6 2.9 3.23z"/>
        </svg>
        <span class="text-xs font-bold dark:text-white">Apple</span>
    </button>
</div>
<br>

                    <div class="text-center">
                        <a href="login.html" class="text-sm font-bold text-primary hover:underline">
                            Back to Sign In
                        </a>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        const html = document.documentElement;
        
        function updateUI() {
            const theme = localStorage.getItem('theme') || 'light';
            if (theme === 'dark') {
                html.classList.add('dark');
                document.getElementById('sun-icon').classList.remove('hidden');
                document.getElementById('moon-icon').classList.add('hidden');
            } else {
                html.classList.remove('dark');
                document.getElementById('sun-icon').classList.add('hidden');
                document.getElementById('moon-icon').classList.remove('hidden');
            }

            const dir = localStorage.getItem('dir') || 'ltr';
            html.dir = dir;
            document.getElementById('dir-label').innerText = dir.toUpperCase();

            lucide.createIcons();
        }

        function toggleTheme() {
            const current = localStorage.getItem('theme') === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', current);
            updateUI();
        }

        function toggleDirection() {
            const current = html.dir === 'ltr' ? 'rtl' : 'ltr';
            localStorage.setItem('dir', current);
            updateUI();
        }

        window.onload = updateUI;
    </script>
</body>
</html>
